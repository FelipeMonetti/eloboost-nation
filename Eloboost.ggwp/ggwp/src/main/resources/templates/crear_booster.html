<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuevo Booster - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; }
        .form-control { background-color: #2c2c2c; border-color: #444; color: #fff; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #d4af37; box-shadow: 0 0 5px #d4af37; }
        label { color: #d4af37; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4 text-warning">Alta de Nuevo Booster 🛡️</h2>
        
        <div class="card bg-dark border-secondary p-4 mx-auto" style="max-width: 600px;">
            <form action="/admin/guardar" method="post">
                
                <div class="mb-3">
                    <label>Nickname</label>
                    <input type="text" name="nickname" class="form-control" placeholder="Ej: FakerFan" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Rango</label>
                        <input type="text" name="rango" class="form-control" placeholder="Ej: Master" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Carril (Rol)</label>
                        <select name="carril" class="form-control">
                            <option value="TOP">TOP</option>
                            <option value="JUNGLE">JUNGLE</option>
                            <option value="MID">MID</option>
                            <option value="ADC">ADC</option>
                            <option value="SUPPORT">SUPPORT</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Nacionalidad</label>
                    <input type="text" name="nacionalidad" class="form-control" placeholder="Ej: ARG 🇦🇷">
                </div>

                <div class="mb-3">
                    <label>Champ Pool</label>
                    <input type="text" name="champPool" class="form-control" placeholder="Ej: Zed, Yasuo">
                </div>

                <div class="mb-3">
                    <label>URL de Foto</label>
                    <input type="text" name="fotoUrl" class="form-control" placeholder="Pegá un link de imagen (jpg/png)" required>
                    <div class="form-text text-secondary">Tip: Buscá 'Splash Art LoL' en Google, click derecho > Copiar dirección de imagen.</div>
                </div>

                <div class="mb-3">
                    <label>Descripción Vendedora</label>
                    <textarea name="descripcion" class="form-control" rows="3" placeholder="Contá por qué sos bueno..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning fw-bold">GUARDAR BOOSTER</button>
                    <a href="/" class="btn btn-outline-secondary">Volver</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
